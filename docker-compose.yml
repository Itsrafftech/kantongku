services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kantongku
    ports:
      - "5433:5432"
    volumes:
      - kantongku_pgdata:/var/lib/postgresql/data

volumes:
  kantongku_pgdata:
